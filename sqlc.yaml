version: "2"
sql:
  - engine: postgresql
    schema: schema/migrations/
    queries: schema/queries/
    gen:
      go:
        package: db
        out: schema/db
        sql_package: pgx/v5
        emit_json_tags: true
        emit_interface: true
        emit_prepared_queries: false
        emit_pointers_for_null_types: true
